<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link rel="manifest" href="manifest.json">
                <meta name="theme-color" content="#0ea5e9">
                    <title>Jackson Co. Scanner</title>
                        <style>
                                body { background: #020617; color: #f8fafc; font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                                        .card { background: #1e293b; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 85%; max-width: 400px; text-align: center; border: 1px solid #334155; }
                                                .status { color: #10b981; font-size: 0.8rem; font-weight: bold; letter-spacing: 0.1em; margin-bottom: 1rem; }
                                                        h1 { margin: 0; font-size: 1.5rem; color: #38bdf8; }
                                                                p { color: #94a3b8; font-size: 0.9rem; margin: 0.5rem 0 2rem 0; }
                                                                        .btn { background: #38bdf8; color: #020617; border: none; padding: 1.2rem 2rem; border-radius: 1rem; font-weight: 800; font-size: 1.1rem; width: 100%; cursor: pointer; transition: transform 0.1s; }
                                                                                .btn:active { transform: scale(0.98); }
                                                                                        .filter-control { margin-top: 2rem; width: 100%; }
                                                                                                input[type=range] { width: 100%; height: 8px; border-radius: 5px; background: #334155; accent-color: #38bdf8; }
                                                                                                        .label { display: block; margin-bottom: 0.5rem; font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
                                                                                                            </style>
                                                                                                            </head>
                                                                                                            <body>
                                                                                                                <div class="card">
                                                                                                                        <div class="status">● LIVE DISPATCH</div>
                                                                                                                                <h1>Jackson County</h1>
                                                                                                                                        <p>Sheriff • Seymour Police/Fire • EMS</p>
                                                                                                                                                
                                                                                                                                                        <button class="btn" id="toggleBtn" onclick="initScanner()">START SCANNER</button>

                                                                                                                                                                <div class="filter-control">
                                                                                                                                                                            <span class="label">Static Filter (Hiss Killer)</span>
                                                                                                                                                                                        <input type="range" id="hissFilter" min="800" max="4000" step="50" value="2500">
                                                                                                                                                                                                    <div id="freqVal" style="font-size: 0.8rem; margin-top: 5px; color: #38bdf8;">2500 Hz</div>
                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                    <script>
                                                                                                                                                                                                                            let audioCtx, source, biquadFilter, audio;
                                                                                                                                                                                                                                    const streamUrl = 'https://broadcastify.cdnstream1.com/41952';

                                                                                                                                                                                                                                            function initScanner() {
                                                                                                                                                                                                                                                        if (!audioCtx) {
                                                                                                                                                                                                                                                                        // Setup Web Audio API
                                                                                                                                                                                                                                                                                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                                                                                                                                                                                                                                                                                                        audio = new Audio(streamUrl);
                                                                                                                                                                                                                                                                                                                        audio.crossOrigin = "anonymous";
                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                        source = audioCtx.createMediaElementSource(audio);
                                                                                                                                                                                                                                                                                                                                                                        biquadFilter = audioCtx.createBiquadFilter();

                                                                                                                                                                                                                                                                                                                                                                                        // Setup the Hiss Killer (Low-Pass)
                                                                                                                                                                                                                                                                                                                                                                                                        biquadFilter.type = "lowpass";
                                                                                                                                                                                                                                                                                                                                                                                                                        biquadFilter.frequency.value = 2500;
                                                                                                                                                                                                                                                                                                                                                                                                                                        biquadFilter.Q.value = 0.7; 

                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Route: Audio -> Filter -> Speakers
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        source.connect(biquadFilter).connect(audioCtx.destination);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        audio.play();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('toggleBtn').innerText = "STOP";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else if (audioCtx.state === 'running') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    audio.pause();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    audioCtx.suspend();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('toggleBtn').innerText = "RESUME";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                audio.play();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                audioCtx.resume();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('toggleBtn').innerText = "STOP";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Live Filter Adjustment
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('hissFilter').oninput = function(e) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const freq = e.target.value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (biquadFilter) biquadFilter.frequency.value = freq;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('freqVal').innerText = freq + " Hz";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Register Service Worker for PWA
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if ('serviceWorker' in navigator) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            navigator.serviceWorker.register('sw.js');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
